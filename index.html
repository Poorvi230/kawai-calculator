<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Kawaii Rage Calc</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap');
:root {
--c1: #FF7EB3; --c2: #B28DFF; --c3: #7DFFD4; --c4: #FFD166; --c5: #4ECDC4;
--bg-grad: linear-gradient(135deg, #fce4ec 0%, #e0c3fc 40%, #c4f1e9 70%, #fff3e0 100%);
--mx: 50vw; --my: 50vh;
}
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
body {
font-family: 'Quicksand', sans-serif; background: var(--bg-grad); background-size: 300% 300%;
animation: bgShift 10s ease infinite; min-height: 100vh; display: flex; justify-content: center;
align-items: center; overflow: hidden; position: relative; cursor: default;
}
@keyframes bgShift { 0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%} }

/* Cursor Glow */
.cursor-glow {
position: fixed; width: 250px; height: 250px; background: radial-gradient(circle, rgba(255,126,179,0.4) 0%, transparent 70%);
border-radius: 50%; pointer-events: none; z-index: 1; transform: translate(-50%, -50%);
left: var(--mx); top: var(--my); transition: left 0.1s, top 0.1s; mix-blend-mode: screen;
}

/* Floating Kawaii Stickers */
.kawaii-float {
position: fixed; font-size: 2rem; opacity: 0.6; pointer-events: none; z-index: 2;
animation: floatUp 6s ease-in-out infinite; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}
@keyframes floatUp { 0%,100%{transform:translateY(0) rotate(0deg) scale(1)}50%{transform:translateY(-25px) rotate(12deg) scale(1.1)} }

/* Calculator Glassmorphism */
.calculator {
width: 380px; background: rgba(255,255,255,0.65); border-radius: 32px; padding: 28px;
box-shadow: 0 20px 50px rgba(0,0,0,0.12), 0 0 0 3px rgba(255,255,255,0.8), inset 0 0 20px rgba(255,255,255,0.5);
backdrop-filter: blur(20px); position: relative; z-index: 100; transition: transform 0.2s ease;
}
.calculator:hover { transform: translateY(-4px) scale(1.01); }

.header { text-align: center; margin-bottom: 18px; }
.header h1 {
font-family: 'Fredoka One', cursive; font-size: 2rem; letter-spacing: -0.5px;
background: linear-gradient(90deg, #ff7eb3, #b28dff, #7dffd4, #ffd166);
-webkit-background-clip: text; color: transparent; text-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.rage-meter { height: 8px; background: #eee; border-radius: 10px; margin-top: 10px; overflow: hidden; }
.rage-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #7dffd4, #b28dff, #ff7eb3); transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

.display {
background: rgba(255,255,255,0.8); color: #2d2d2d; font-size: 2.4rem; padding: 22px;
text-align: right; border-radius: 20px; border: 2px solid rgba(255,255,255,0.9); min-height: 80px;
box-shadow: inset 0 4px 12px rgba(0,0,0,0.05), 0 4px 15px rgba(0,0,0,0.08);
margin-bottom: 22px; font-family: 'Fredoka One', cursive; position: relative; overflow: hidden;
}
.display::before { content: "✨"; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 1.5rem; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{transform:translateY(-50%) scale(1)}50%{transform:translateY(-50%) scale(1.2)} }

.buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
button {
padding: 18px; font-size: 1.3rem; border: none; border-radius: 18px; cursor: pointer;
transition: all 0.15s cubic-bezier(0.4,0,0.2,1); font-weight: bold; font-family: 'Quicksand', sans-serif;
position: relative; overflow: hidden; top: 0;
}
button::after {
content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%,-50%);
transition: width 0.4s, height 0.4s;
}
button:active::after { width: 200px; height: 200px; opacity: 0; }
button:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
button:active { transform: translateY(3px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); top: 3px; }

.num { background: linear-gradient(135deg, #e0f2fe, #f0f9ff); color: #475569; border: 2px solid #bae6fd; }
.op { background: linear-gradient(135deg, #ff7eb3, #ff9ec6); color: white; border: 2px solid #ff5da2; box-shadow: 0 4px 0 #e63d7a; }
.op:hover { background: linear-gradient(135deg, #ff5da2, #ff7eb3); }
.op:active { box-shadow: 0 0 0 #e63d7a; }
.clear { background: linear-gradient(135deg, #7dffd4, #a8ffeb); color: #1e3a2f; border: 2px solid #4ecdc4; box-shadow: 0 4px 0 #3db8ac; }
.clear:active { box-shadow: 0 0 0 #3db8ac; }
.eq { background: linear-gradient(135deg, #b28dff, #d4aaff); color: white; grid-column: span 2; border: 2px solid #9a6bff; box-shadow: 0 4px 0 #7a4bff; }
.eq:active { box-shadow: 0 0 0 #7a4bff; }
.dec { background: linear-gradient(135deg, #fff3cd, #ffeaa7); color: #856404; border: 2px solid #ffc107; }

/* Overlays */
.overlay {
position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7);
display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(10px);
}
.overlay.active { display: flex; }
.popup {
background: white; padding: 32px; border-radius: 28px; text-align: center; border: 3px solid var(--c1);
box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 90%; animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.popup h2 { color: #b28dff; font-family: 'Fredoka One', cursive; margin-bottom: 16px; font-size: 1.6rem; }
.popup p { color: #555; margin-bottom: 22px; line-height: 1.6; font-weight: 500; }
.btn-kawaii {
background: linear-gradient(135deg, #b28dff, #ff7eb3); color: white; border: none; padding: 14px 28px;
border-radius: 22px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0 #8a5cd9;
font-family: 'Quicksand', sans-serif; font-size: 1rem;
}
.btn-kawaii:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #8a5cd9; }

/* Full-Screen Meme Overlay */
.meme-overlay {
position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.82);
display: none; justify-content: center; align-items: center; z-index: 10000;
}
.meme-overlay.active { display: flex; }
.meme-overlay img {
max-width: 80%; max-height: 75vh; border-radius: 24px; border: 5px solid white;
box-shadow: 0 25px 70px rgba(0,0,0,0.4); animation: memePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes memePop { 0% { transform: scale(0.4) rotate(-12deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }

/* Floating Memes */
.float-meme {
position: fixed; max-width: 120px; max-height: 120px; border-radius: 20px; object-fit: cover;
border: 3px solid white; box-shadow: 0 12px 30px rgba(0,0,0,0.15); opacity: 0.75;
pointer-events: none; z-index: 3; animation: floatMeme 7s ease-in-out infinite;
}
@keyframes floatMeme { 0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-20px) rotate(3deg)} }
</style>
</head>
<body>
<div class="cursor-glow"></div>
<div class="calculator" id="calc">
<div class="header"><h1> Kawaii Calc </h1><div class="rage-meter"><div class="rage-fill" id="rageFill"></div></div></div>
<div class="display" id="display">0</div>
<div class="buttons">
<button class="clear" onclick="clearDisplay()">C</button><button class="num" onclick="deleteLast()">⌫</button>
<button class="op" onclick="append('%')">%</button><button class="op" onclick="append('/')">÷</button>
<button class="num" onclick="append('7')">7</button><button class="num" onclick="append('8')">8</button>
<button class="num" onclick="append('9')">9</button><button class="op" onclick="append('*')">×</button>
<button class="num" onclick="append('4')">4</button><button class="num" onclick="append('5')">5</button>
<button class="num" onclick="append('6')">6</button><button class="op" onclick="append('-')">−</button>
<button class="num" onclick="append('1')">1</button><button class="num" onclick="append('2')">2</button>
<button class="num" onclick="append('3')">3</button><button class="op" onclick="append('+')">+</button>
<button class="num" onclick="append('0')">0</button><button class="dec" onclick="append('.')">.</button>
<button class="eq" onclick="calculate()">=</button>
</div>
</div>

<div class="overlay" id="rageOverlay"><div class="popup" id="ragePopup"></div></div>
<div class="meme-overlay" id="memeOverlay"><img id="memeImg" src="" alt="meme"></div>

<script>
// 🎀 SOUNDS
const sounds = {
  click: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-software-click-close-2577.mp3'),
  success: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3'),
  error: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3'),
  rage: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-cartoon-boing-spring-2043.mp3'),
  popup: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-modern-technology-select-3235.mp3'),
  tuco: new Audio('https://www.myinstants.com/media/sounds/tuco-get-out.mp3'),
  faaahhh: new Audio('https://www.myinstants.com/media/sounds/ive-got-this-faaaaaaaaahhhhh.mp3'),
  sadviolin: new Audio('https://www.myinstants.com/media/sounds/sad-violin-the-meme-one.mp3'),
  meowgop: new Audio('https://www.myinstants.com/media/sounds/mka-ladle-meow-gop.mp3')
};
Object.keys(sounds).forEach(k => { sounds[k].volume = k==='faaahhh'||k==='meowgop'?1:k==='tuco'?0.9:k==='sadviolin'?0.8:0.3; });

function playSound(type, trimSec = 0) {
  if (!sounds[type]) return;
  sounds[type].currentTime = 0;
  sounds[type].play().catch(()=>{});
  if (trimSec > 0) {
    const dur = sounds[type].duration || 4;
    setTimeout(() => { sounds[type].pause(); sounds[type].currentTime = 0; }, (dur - trimSec) * 1000);
  }
}

// 🎀 MEME CONFIG & QUEUE
const memes = {
  faaahhh: { src: 'meme3.jpeg', sound: 'faaahhh', dur: 3000 },
  sadviolin: { src: 'meme2.jpeg', sound: 'sadviolin', dur: 3000 },
  meowgop: { src: 'meme1.jpeg', sound: 'meowgop', dur: 0, trim: 1 }, // Trim 1s from end
  tuco: { src: 'meme4.jpeg', sound: 'tuco', dur: 3000 }
};
let queue = ['faaahhh','sadviolin','meowgop','tuco'], shown = new Set();

function getCalcType(res) {
  const len = Math.abs(res).toString().split('.')[0].length;
  if(len>=4 && len<=6) return 'faaahhh';
  if(len>=2 && len<=3) return 'meowgop';
  if([1,4,9,16,25,36,49].includes(res)) return 'sadviolin';
  return 'tuco';
}
function getNextMeme(res) {
  const pref = getCalcType(res);
  if(!shown.has(pref) && queue.includes(pref)) { shown.add(pref); return memes[pref]; }
  const next = queue.find(m=>!shown.has(m));
  if(next) { shown.add(next); return memes[next]; }
  shown.clear(); queue=queue.sort(()=>Math.random()-0.5);
  const f=queue[0]; shown.add(f); return memes[f];
}

// 🎀 FULL-SCREEN MEME
function showMainMeme(expr, res) {
  const m = getNextMeme(res);
  const ov = document.getElementById('memeOverlay'), img = document.getElementById('memeImg');
  img.src = m.src; ov.classList.add('active');
  playSound(m.sound, m.trim || 0);
  const dur = m.dur===0 ? ((sounds[m.sound].duration||4) * 1000) : m.dur;
  setTimeout(() => {
    ov.classList.remove('active');
    display.textContent = `✨ ${res}`;
    setTimeout(() => { expression=res.toString(); updateDisplay(); }, 2200);
  }, dur);
}

// 🌸 FLOATING BACKGROUND ELEMENTS
const kawaiiEmojis = ['🐱','🌸','🎀','✨','💖','🍰','🧸','⭐','🌈','🍓','🦋','🍡','🐰',''];
function spawnBgElement() {
  const ov = document.getElementById('memeOverlay');
  if(ov.classList.contains('active')) return;
  
  const isMeme = Math.random() > 0.6;
  const el = document.createElement('div');
  
  if(isMeme) {
    el.className = 'float-meme';
    el.style.backgroundImage = `url(${['meme1.jpeg','meme2.jpeg','meme3.jpeg','meme4.jpeg'][Math.floor(Math.random()*4)]})`;
    el.style.backgroundSize = 'cover';
  } else {
    el.className = 'kawaii-float';
    el.textContent = kawaiiEmojis[Math.floor(Math.random()*kawaiiEmojis.length)];
    el.style.fontSize = (1.5 + Math.random()*2) + 'rem';
  }
  
  el.style.left = Math.random()*90 + 'vw';
  el.style.top = Math.random()*90 + 'vh';
  el.style.animationDelay = Math.random()*2 + 's';
  el.style.animationDuration = (5 + Math.random()*4) + 's';
  document.body.appendChild(el);
  
  const life = 6000 + Math.random()*4000;
  setTimeout(() => { el.style.opacity='0'; el.style.transform='scale(0.5)'; setTimeout(()=>el.remove(), 400); }, life);
}
setInterval(spawnBgElement, 2000);

// ️ MOUSE INTERACTIVITY
document.addEventListener('mousemove', e => {
  document.body.style.setProperty('--mx', e.clientX + 'px');
  document.body.style.setProperty('--my', e.clientY + 'px');
  
  // Subtle calculator parallax
  const calc = document.getElementById('calc');
  const rect = calc.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const dx = (e.clientX - cx) / 30;
  const dy = (e.clientY - cy) / 30;
  calc.style.transform = `translate(${dx}px, ${dy}px) scale(1.01)`;
});

// 🎀 STATE
let expression = '';
let rageLevel = parseInt(localStorage.getItem('kawaii_rage')) || 1;
let calcCount = parseInt(localStorage.getItem('kawaii_calcs')) || 0;
const display = document.getElementById('display');
const rageFill = document.getElementById('rageFill');
const overlay = document.getElementById('rageOverlay');
const popup = document.getElementById('ragePopup');
updateRageUI();

function updateDisplay() { display.textContent = expression || '0'; }
function append(v) { playSound('click'); expression+=v; updateDisplay(); }
function clearDisplay() { playSound('click'); expression=''; updateDisplay(); }
function deleteLast() { playSound('click'); expression=expression.slice(0,-1); updateDisplay(); }

function calculate() {
  if(!expression) return;
  playSound('popup');
  if(Math.random()<0.08+rageLevel*0.04) { playSound('rage'); showRagePopup(); return; }
  try {
    if(/[^0-9+\-*/.%() ]/.test(expression)) throw new Error('Invalid');
    const res = eval(expression);
    showMainMeme(expression, res);
    calcCount++;
    if(calcCount%3===0) rageLevel=Math.min(rageLevel+1,10);
    localStorage.setItem('kawaii_rage',rageLevel); localStorage.setItem('kawaii_calcs',calcCount);
    updateRageUI();
  } catch(e) {
    playSound('error'); display.textContent='Error 🌸'; setTimeout(()=>updateDisplay(),1500);
  }
}

function updateRageUI() {
  rageFill.style.width=`${(rageLevel/10)*100}%`;
  if(rageLevel>=7) rageFill.style.background='linear-gradient(90deg,#b28dff,#ff7eb3,#ffd166)';
}
function showRagePopup() {
  const msgs=[
    {t:'💖 System Overload!',x:'Kitty needs a nap! Wait 3s...',d:3000},
    {t:'🌈 Update Required!',x:'Downloading sparkle patch...',d:2500},
    {t:'🎀 Battery Low!',x:'Shake device to continue.',d:2000},
    {t:' Too Many Numbers!',x:'Broke the math. Try again.',d:1500}
  ];
  const p=msgs[Math.floor(Math.random()*msgs.length)];
  popup.innerHTML=`<h2>${p.t}</h2><p>${p.x}</p><button class="btn-kawaii" onclick="closeRage()">OK 😌</button>`;
  overlay.classList.add('active'); setTimeout(()=>closeRage(),p.d);
}
function closeRage() { playSound('click'); overlay.classList.remove('active'); }

document.querySelector('.header h1').addEventListener('click',()=>{
  if(confirm('Reset rage? (Cheater 😏)')){
    rageLevel=1;calcCount=0;shown.clear();queue=['faaahhh','sadviolin','meowgop','tuco'];
    localStorage.setItem('kawaii_rage',1);localStorage.setItem('kawaii_calcs',0);
    updateRageUI();expression='';updateDisplay();playSound('success');
  }
});
</script>
</body>
</html>
